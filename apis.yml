description: >-
  Scientific Games is the global lottery company serving government-sponsored
  lotteries on six continents in 50+ countries with instant scratch games,
  draw-based and terminal-generated games, iLottery and mobile platforms,
  Central Gaming Systems (CGS), retail point-of-sale technology, sports
  betting solutions, loyalty/CRM, analytics, and managed/partner services.
  The company traces to Scientific Games Holdings (founded 1973) and was
  merged into Scientific Games Corporation in 2001 alongside the WMS, Bally
  and NYX/OpenBet acquisitions. In April 2022 the lottery business was
  carved out and sold to Brookfield Business Partners for $6.05 billion,
  taking Scientific Games private; the residual gaming and digital
  businesses were renamed Light & Wonder (NASDAQ/ASX: LNW), and the social
  casino subsidiary SciPlay (spun off via IPO in 2019) was reabsorbed and
  later sits within Light & Wonder. Today Scientific Games operates as an
  independent, Brookfield-owned, pure-play lottery technology and services
  company headquartered in Atlanta, Georgia, with instant ticket
  manufacturing in Alpharetta and Montreal. Scientific Games does not
  publish a developer portal, OpenAPI specifications, or public SDKs;
  customer integrations are delivered under direct contract with
  government lottery operators.
