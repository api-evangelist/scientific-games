apis:
  - name: Lottery Games
    description: >-
      Scientific Games is the world's largest producer of instant scratch
      lottery games, generating 70% of global instant game retail sales,
      and offers more than 160 terminal-generated games across 10
      categories including traditional draw, PlayNow fast-play, Keno,
      and virtual sports, plus second-chance and digital titles.
    humanURL: https://www.scientificgames.com/products/games/
    tags:
      - Instant Tickets
      - Scratch Games
      - Draw Games
      - Keno
      - PlayNow
      - Virtual Sports
  - name: Central Gaming Systems
    description: >-
      Enterprise omni-channel lottery gaming systems (CGS) supporting draw
      games, instant game management, retailer terminals, video lottery,
      digital lottery, and sports betting. Positioned as the leading
      lottery systems provider in Europe and the fastest growing in the
      U.S. No public API or developer documentation is published.
    humanURL: https://www.scientificgames.com/products/technologies/
    tags:
      - Gaming Systems
      - Lottery Platform
      - Retail Technology
      - Omnichannel
  - name: iLottery Digital Platform
    description: >-
      Digital lottery platform serving more than 30 lotteries worldwide
      with eInstant and eDraw games, mobile-first lottery apps,
      microsites, an Interactive Game Gallery library, second-chance
      experiences, and an award-winning AI-powered player CRM (notably
      deployed for Pennsylvania iLottery). All integrations are delivered
      under direct contract; no public SDKs or OpenAPI specs are
      published.
    humanURL: https://www.scientificgames.com/products/digital/
    tags:
      - iLottery
      - Mobile
      - Loyalty
      - CRM
      - Player Engagement
  - name: Sports Betting
    description: >-
      Retail and digital sports betting solutions for government lottery
      operators in Canada, Europe and the U.S. Combines pre-game and
      in-play sports content across soccer, tennis, basketball, football,
      baseball, hockey, motor sports and racing with self-service betting
      terminals integrated into lottery central gaming systems and
      retail networks.
    humanURL: https://www.scientificgames.com/products/sports-betting/
    tags:
      - Sports Betting
      - Retail Wagering
      - Self-Service Terminals
  - name: Partner Services
    description: >-
      End-to-end instant lottery product management, facilities, field
      services and managed services for government lottery customers,
      bundling Scientific Games game design, manufacturing (Alpharetta
      and Montreal), warehousing, distribution and marketing into a
      turnkey operations contract.
    humanURL: https://www.scientificgames.com/products/partner-services/
    tags:
      - Managed Services
